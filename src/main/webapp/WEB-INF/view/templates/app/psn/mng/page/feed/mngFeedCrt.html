<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/app/psn/mng/layouts/mng_layout}" lang="ko">
<th:block layout:fragment="content">

	<link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css"/>
	<script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>

	<div id="page-notice" class="page-content w-full min-h-screen bg-[#f8fafc] p-6 lg:p-10 font-sans text-slate-600 animate-slide-up">

		<div id="view-write" class="animate-slide-up max-w-5xl mx-auto">
			<header class="flex justify-between items-center mb-8 sticky top-0 bg-[#f8fafc]/90 backdrop-blur-sm z-10 py-4">
				<div class="flex items-center gap-4">
					<button onclick="history.back()"
					        class="w-10 h-10 rounded-full bg-white border border-slate-200 text-slate-500 flex items-center justify-center hover:bg-slate-50 hover:text-slate-900 transition shadow-sm">
						<i class="fas fa-arrow-left"></i>
					</button>
					<div>
						<h1 id="form-title" class="text-2xl font-black text-slate-900 tracking-tight">공지사항 수정</h1>
						<p class="text-xs text-slate-500 font-medium mt-1">등록된 게시글의 내용을 수정합니다.</p>
					</div>
				</div>
				<div class="flex gap-2">
					<button type="button" onclick="location.href='/mng/feed/feedList.pg';"
					        class="px-5 py-2.5 rounded-xl bg-white border border-slate-200 text-slate-600 text-sm font-bold hover:bg-slate-50 transition shadow-sm">
						목록
					</button>
					<button type="button" id="btn-save"
					        class="px-6 py-2.5 rounded-xl bg-indigo-600 text-white text-sm font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition flex items-center">
						<i class="fas fa-paper-plane mr-2"></i> 저장하기
					</button>
				</div>
			</header>

			<form id="noticeForm" class="pb-20">
				<div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
					<div class="lg:col-span-3 space-y-6">
						<div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
							<div class="mb-6">
								<label class="form-label block text-sm font-bold text-slate-700 mb-2">제목 <span class="text-red-500">*</span></label>
								<input type="text" id="title" name="title" placeholder="공지사항 제목을 입력하세요"
								       class="w-full text-lg font-bold placeholder-slate-300 py-3 border-b-2 border-slate-100 focus:border-indigo-500 outline-none transition bg-transparent">
							</div>

							<div>
								<label class="form-label block text-sm font-bold text-slate-700 mb-2">내용</label>
								<div id="editor-container" class="bg-white"></div>
							</div>
						</div>
					</div>

					<div class="lg:col-span-1 space-y-6">
						<div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm sticky top-24">
							<h2 class="text-xs font-black text-slate-800 uppercase mb-5 tracking-wider border-b border-slate-100 pb-3 flex items-center justify-between">
								게시 설정 <i class="fas fa-cog text-slate-300"></i>
							</h2>

							<div class="space-y-5">
								<div>
									<label class="block text-xs font-bold text-slate-600 mb-2">카테고리</label>
									<select id="category" class="w-full rounded-xl border-slate-200 text-sm text-slate-600 focus:ring-indigo-500 focus:border-indigo-500 py-2.5">
										<option value="NOTICE">📢 공지사항</option>
										<option value="EVENT">🎉 이벤트</option>
										<option value="GENERAL">📰 일반글</option>
									</select>
								</div>
							</div>
							<div class="space-y-5">
								<div>
									<label class="block text-xs font-bold text-slate-600 mb-2">사용여부</label>
									<select id="useYn" class="w-full rounded-xl border-slate-200 text-sm text-slate-600 focus:ring-indigo-500 focus:border-indigo-500 py-2.5">
										<option value="Y">✅ 사용</option>
										<option value="N">❌ 미사용</option>
									</select>
								</div>
							</div>
						</div>
					</div>
				</div>
			</form>
		</div>
	</div>

	<script th:inline="javascript">

		$(function () {

			const editor = new toastui.Editor({
				el: $('#editor-container')[0],
				height: '500px',
				initialEditType: 'wysiwyg',
				previewStyle: 'vertical',
				language: 'ko-KR',
				placeholder: '내용을 입력해주세요.',
				toolbarItems: [
					['heading', 'bold', 'italic', 'strike'],
					['hr', 'quote'],
					['ul', 'ol', 'task', 'indent', 'outdent'],
					['table', 'image', 'link'],
					['code', 'codeblock']
				]
			});

			$('#btn-save').on('click', function () {
				const title = $('#title').val();
				const content = editor.getHTML();
				const category = $('#category').val();

				// 유효성 검사
				if (!$.trim(title)) {
					alert('제목을 입력해주세요.');
					$('#title').focus();
					return;
				}
				if (editor.getMarkdown().length < 1) {
					alert('내용을 입력해주세요.');
					return;
				}

				const requestData = {
					title: title,
					content: content,
					bbsType: category,
					useYn: $('#useYn').val(),
				};

				$.ajax({
					url: '/mng/feed/crtFeedDo.ax',
					type: 'POST',
					data: JSON.stringify(requestData),
					contentType: "application/json; charset=utf-8",
					success: (res) => {
						if (typeof Toast !== 'undefined') {
							Toast.success(res.rtnMsg || '성공적으로 저장되었습니다.');
						} else {
							alert(res.rtnMsg || '성공적으로 저장되었습니다.');
						}
					},
					error: (xhr, status, error) => {
						console.error("수정 실패:", error);
						alert('저장 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
					}
				});
			});

		});
	</script>

</th:block>
</html>
