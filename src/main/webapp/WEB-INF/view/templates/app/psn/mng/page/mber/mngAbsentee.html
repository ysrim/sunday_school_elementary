<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/app/psn/mng/layouts/mng_layout}" lang="ko">
<th:block layout:fragment="content">
	<script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>

	<div id="page-absentees" class="page-content w-full min-h-screen bg-[#f8f9fa] p-5 font-sans text-slate-600 animate-fade-in">

		<div id="view-list" class="flex flex-col h-full">
			<header class="flex justify-between items-end mb-6">
				<div>
					<span class="px-2.5 py-0.5 rounded-full bg-rose-50 text-rose-600 text-[10px] font-bold uppercase tracking-wider mb-1 inline-block">Care & Management</span>
					<h1 class="text-2xl font-black text-slate-900 tracking-tight">Lost Warriors (장결자 관리)</h1>
					<p class="text-xs text-slate-500 mt-1 font-medium">왕국의 대열에서 이탈한 길 잃은 용사들의 연락 및 복귀 상태를 관리합니다.</p>
				</div>
				<button onclick="AbsenteeManager.api.exportList()"
				        class="bg-rose-600 text-white px-4 py-2.5 rounded-xl text-xs font-bold hover:bg-rose-700 shadow-lg shadow-rose-200 transition flex items-center transform hover:scale-105 active:scale-95">
					<i class="fas fa-file-excel mr-2"></i> 장결자 명단 다운로드
				</button>
			</header>

			<div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mb-5 flex flex-wrap gap-3 justify-between items-center">
				<div class="relative w-full md:w-64 group">
					<input type="text" id="gridSearchInput" placeholder="이름 또는 ID 검색"
					       class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold focus:ring-2 focus:ring-rose-100 focus:border-rose-500 outline-none transition group-hover:bg-white">
					<i class="fas fa-search absolute left-3.5 top-2.5 text-slate-400 text-xs group-hover:text-rose-500 transition-colors"></i>
				</div>

				<div class="flex gap-2">
					<select id="statusFilter" class="px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold focus:ring-2 focus:ring-rose-100 focus:border-rose-500 outline-none">
						<option value="">전체 상태 보기</option>
						<option value="연락요망">연락요망</option>
						<option value="연락중">연락중</option>
						<option value="심방예정">심방예정</option>
						<option value="장기보류">장기보류</option>
					</select>
				</div>
			</div>

			<div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
				<div id="absenteeGrid" class="ag-theme-quartz" style="width: 100%; height: 600px;"></div>
			</div>
		</div>

		<div id="view-write" class="hidden animate-fade-in">
			<header class="flex justify-between items-center mb-6">
				<div class="flex items-center gap-3">
					<button onclick="AbsenteeManager.ui.toggleMode('list')"
					        class="w-8 h-8 rounded-full bg-white border border-slate-200 text-slate-500 flex items-center justify-center hover:bg-slate-50 hover:text-slate-800 transition shadow-sm">
						<i class="fas fa-arrow-left text-xs"></i>
					</button>
					<h1 id="form-title" class="text-xl font-black text-slate-900 tracking-tight">용사 관리 일지</h1>
				</div>
				<div class="flex gap-2">
					<button onclick="AbsenteeManager.ui.toggleMode('list')"
					        class="px-4 py-2 rounded-xl bg-white border border-slate-200 text-slate-600 text-xs font-bold hover:bg-slate-50 transition shadow-sm">
						취소
					</button>
					<button onclick="AbsenteeManager.api.saveRecord()" class="px-4 py-2 rounded-xl bg-rose-600 text-white text-xs font-bold hover:bg-rose-700 shadow-md shadow-rose-200 transition flex items-center">
						<i class="fas fa-save mr-1.5"></i> 기록 저장하기
					</button>
				</div>
			</header>

			<form id="absenteeForm">
				<input type="hidden" id="mberSn" name="mberSn">
				<div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
					<div class="lg:col-span-1">
						<div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm text-center">
							<div class="relative inline-block mb-4">
								<img id="formAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Lost"
								     class="w-24 h-24 rounded-2xl bg-slate-50 border-2 border-slate-200 opacity-80 grayscale">
							</div>
							<h3 id="displayName" class="font-bold text-slate-800 text-lg">용사 이름</h3>
							<p id="displayId" class="text-[10px] text-slate-400 mt-1">@userid</p>

							<div class="mt-6 pt-6 border-t border-slate-100 text-left space-y-3">
								<div class="flex justify-between items-center">
									<span class="text-xs font-bold text-slate-500">소속</span>
									<span id="displayDept" class="text-xs font-bold text-slate-800">1학년 믿음반</span>
								</div>
								<div class="flex justify-between items-center">
									<span class="text-xs font-bold text-slate-500">최근 출석일</span>
									<span id="displayLastAtt" class="text-xs font-bold text-rose-500">2023.10.15</span>
								</div>
								<div class="flex justify-between items-center">
									<span class="text-xs font-bold text-slate-500">결석 기간</span>
									<span id="displayAbsentWeeks" class="text-xs font-bold text-rose-600 bg-rose-50 px-2 py-1 rounded-md">12주 연속</span>
								</div>
							</div>
						</div>
					</div>

					<div class="lg:col-span-2">
						<div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-5">
							<h3 class="text-sm font-black text-slate-800 border-b border-slate-100 pb-2">연락 및 관리 정보</h3>

							<div class="grid grid-cols-1 md:grid-cols-2 gap-5">
								<div>
									<label class="form-label">현재 상태 지정 *</label>
									<select id="formStatus" class="form-input text-rose-600 font-bold border-rose-200 focus:border-rose-500 focus:ring-rose-100">
										<option value="연락요망">🚨 연락요망</option>
										<option value="연락중">💬 연락중</option>
										<option value="심방예정">🏃 심방예정</option>
										<option value="장기보류">💤 장기보류</option>
									</select>
								</div>
								<div><label class="form-label">최근 연락일</label><input type="date" id="formContactDate" class="form-input"></div>

								<div>
									<label class="form-label">용사 연락처</label>
									<div class="flex">
										<input type="tel" id="formPhone" class="form-input rounded-r-none" readonly>
										<a id="btnCallMember" href="#" class="bg-slate-100 border border-l-0 border-slate-200 px-3 py-2 rounded-r-xl text-slate-500 hover:text-indigo-600"><i class="fas fa-phone"></i></a>
									</div>
								</div>
								<div>
									<label class="form-label">보호자 연락처</label>
									<div class="flex">
										<input type="tel" id="formParentPhone" class="form-input rounded-r-none" readonly>
										<a id="btnCallParent" href="#" class="bg-slate-100 border border-l-0 border-slate-200 px-3 py-2 rounded-r-xl text-slate-500 hover:text-indigo-600"><i class="fas fa-phone"></i></a>
									</div>
								</div>

								<div class="md:col-span-2">
									<label class="form-label">상담 기록 및 메모</label>
									<textarea id="formMemo" rows="5" class="form-input" placeholder="통화 내용, 심방 결과, 기도 제목 등을 기록해주세요..."></textarea>
								</div>
							</div>
						</div>
					</div>
				</div>
			</form>
		</div>
	</div>

	<script th:inline="javascript">
		/*<![CDATA[*/

		const AbsenteeManager = {
			gridApi: null,

			init() {
				this.grid.init();
				this.bindEvents();
				this.grid.loadData();
			},

			grid: {
				init() {
					const columnDefs = [
						{
							headerName: "용사 정보", field: "name", width: 220,
							cellClass: "flex items-center",
							cellRenderer: (params) => {
								return `
                            <div class="flex items-center gap-3 w-full">
                               <div class="relative w-11 h-11 flex-shrink-0">
                                  <img src="${params.data.avatar}" class="w-full h-full rounded-xl bg-slate-100 border border-slate-200 object-cover grayscale opacity-80">
                               </div>
                               <div class="flex flex-col justify-center">
                                  <div class="font-bold text-slate-800 text-sm leading-tight">${params.value}</div>
                                  <div class="text-[10px] text-slate-400 font-medium leading-tight mt-1">@${params.data.userId}</div>
                               </div>
                            </div>
                         `;
							}
						},
						{
							headerName: "소속 (학년/반/길드)", width: 160,
							cellClass: "flex items-center",
							cellRenderer: (params) => {
								return `
                            <div class="text-xs text-slate-700">
                               <span class="font-bold">${params.data.grade}학년 ${params.data.classNm}반</span><br/>
                               <span class="text-slate-500 font-medium">${params.data.guildName}</span>
                            </div>
                         `;
							}
						},
						{
							headerName: "결석 지표",
							width: 200,
							cellClass: "flex items-center",
							cellRenderer: (params) => {
								// 결석 주차가 높을수록 경고색(Red) 표시
								const isCritical = params.data.absentWeeks >= 8;
								const badgeClass = isCritical ? 'bg-rose-100 text-rose-700 border-rose-200' : 'bg-orange-50 text-orange-600 border-orange-100';

								return `
                            <div class="flex flex-col justify-center w-full">
                               <div class="text-xs text-slate-500 mb-1">최근: <span class="font-bold text-slate-700">${params.data.lastAttendDate}</span></div>
                               <div class="inline-block px-2 py-0.5 rounded text-[11px] font-bold border w-fit ${badgeClass}">
                                  ${params.data.absentWeeks}주 연속 결석
                               </div>
                            </div>
                         `;
							}
						},
						{
							headerName: "관리 상태", field: "status", width: 130,
							cellClass: "flex items-center",
							cellRenderer: (params) => {
								let icon = "fa-question-circle";
								let color = "text-slate-500";

								if(params.value === '연락요망') { icon = "fa-bell"; color = "text-rose-500"; }
								if(params.value === '연락중') { icon = "fa-comments"; color = "text-blue-500"; }
								if(params.value === '심방예정') { icon = "fa-walking"; color = "text-emerald-500"; }
								if(params.value === '장기보류') { icon = "fa-bed"; color = "text-slate-400"; }

								return `
                            <div class="flex items-center font-bold text-xs ${color}">
                               <i class="fas ${icon} mr-1.5"></i> ${params.value}
                            </div>
                         `;
							}
						},
						{
							headerName: "최근 연락일", field: "lastContactDate", flex: 1, minWidth: 120,
							cellClass: "flex items-center font-medium text-slate-500 text-xs",
							valueFormatter: (params) => params.value ? params.value : '기록 없음'
						}
					];

					const gridOptions = {
						columnDefs: columnDefs,
						rowData: [],
						defaultColDef: {resizable: true, sortable: true},
						pagination: true,
						paginationPageSize: 20,
						headerHeight: 48,
						rowHeight: 80,
						rowClass: "hover:bg-rose-50/30 transition-colors cursor-pointer", // Hover 색상 로즈톤으로 변경
						overlayLoadingTemplate: `<div class="flex flex-col items-center"><i class="fas fa-spinner fa-spin text-2xl text-rose-500 mb-2"></i><span class="text-xs text-slate-500 font-bold">장결자 데이터를 불러오는 중...</span></div>`,
						overlayNoRowsTemplate: `<div class="text-xs text-slate-400 py-10">장결자가 없습니다. 할렐루야!</div>`,
						onRowClicked: (event) => {
							if (!event.event.target.closest('button')) {
								AbsenteeManager.ui.editRecord(event.data.id);
							}
						}
					};

					const gridDiv = document.querySelector('#absenteeGrid');
					AbsenteeManager.gridApi = agGrid.createGrid(gridDiv, gridOptions);
				},

				loadData() {
					const api = AbsenteeManager.gridApi;
					if (!api) return;

					api.showLoadingOverlay();

					// 서버 API 호출 (장결자 목록 가져오는 API로 변경 필요)
					// 예: /mng/mber/getAbsenteeList.ax

					// [시뮬레이션 용 가짜 데이터 설정]
					setTimeout(() => {
						const mockData = [
							{ id: 1, name: "김철수", userId: "chulsoo99", grade: 2, classNm: "소망", guildName: "홀리나이트", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=1", lastAttendDate: "2023.12.25", absentWeeks: 12, status: "연락요망", lastContactDate: "2024.01.10", phone: "010-1234-5678", parentPhone: "010-9999-8888", memo: "" },
							{ id: 2, name: "이영희", userId: "younghee", grade: 1, classNm: "믿음", guildName: "소속 없음", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=2", lastAttendDate: "2024.01.28", absentWeeks: 7, status: "심방예정", lastContactDate: "2024.03.01", phone: "010-1111-2222", parentPhone: "010-3333-4444", memo: "다음 주 수요일 학교 앞 심방 예정" },
							{ id: 3, name: "박지민", userId: "jiminpark", grade: 3, classNm: "사랑", guildName: "엔젤스", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=3", lastAttendDate: "2023.10.01", absentWeeks: 24, status: "장기보류", lastContactDate: "2023.11.15", phone: "010-5555-6666", parentPhone: "010-7777-8888", memo: "타 지역 이사로 인한 출석 불가. 전출 처리 전까지 보류." },
						];
						api.updateGridOptions({rowData: mockData});
						api.hideOverlay();
					}, 500);

					/* 실제 사용 시 아래 주석 해제 및 수정
					$.ajax({
					   url: '/mng/mber/getAbsenteeList.ax',
					   type: 'POST',
					   dataType: 'json',
					   success: function (response) { ... api.updateGridOptions({rowData: mappedData}); },
					   error: function (error) { api.updateGridOptions({rowData: []}); }
					});
					*/
				}
			},

			bindEvents() {
				$('#gridSearchInput').on('input', function () {
					if (AbsenteeManager.gridApi) AbsenteeManager.gridApi.setGridOption('quickFilterText', $(this).val());
				});

				$('#statusFilter').on('change', function() {
					const selectedStatus = $(this).val();
					if (!AbsenteeManager.gridApi) return;

					if(selectedStatus) {
						// 상태 컬럼을 기준으로 필터링 적용
						AbsenteeManager.gridApi.setColumnFilterModel('status', {
							type: 'equals',
							filter: selectedStatus
						}).then(() => {
							AbsenteeManager.gridApi.onFilterChanged();
						});
					} else {
						// 필터 초기화
						AbsenteeManager.gridApi.destroyFilter('status');
					}
				});
			},

			ui: {
				toggleMode(mode) {
					const listDiv = $('#view-list');
					const writeDiv = $('#view-write');

					if (mode === 'write') {
						listDiv.addClass('hidden');
						writeDiv.removeClass('hidden');
					} else if (mode === 'list') {
						writeDiv.addClass('hidden');
						listDiv.removeClass('hidden');
						$('#absenteeForm')[0].reset();
					}
				},

				editRecord(id) {
					let rowData = null;
					AbsenteeManager.gridApi.forEachNode(node => {
						if (node.data.id === id) rowData = node.data;
					});

					if (rowData) {
						// 읽기 전용 정보 세팅
						$('#formAvatar').attr('src', rowData.avatar);
						$('#displayName').text(rowData.name);
						$('#displayId').text('@' + rowData.userId);
						$('#displayDept').text(`${rowData.grade}학년 ${rowData.classNm}반`);
						$('#displayLastAtt').text(rowData.lastAttendDate);
						$('#displayAbsentWeeks').text(`${rowData.absentWeeks}주 연속`);

						// 전화번호 링크 연결
						$('#formPhone').val(rowData.phone);
						$('#btnCallMember').attr('href', 'tel:' + rowData.phone);
						$('#formParentPhone').val(rowData.parentPhone);
						$('#btnCallParent').attr('href', 'tel:' + rowData.parentPhone);

						// 수정 가능한 폼 세팅
						$('#mberSn').val(rowData.id);
						$('#formStatus').val(rowData.status);

						// 날짜 형식 변환 (YYYY.MM.DD -> YYYY-MM-DD) input[type="date"] 호환을 위함
						if(rowData.lastContactDate && rowData.lastContactDate !== '기록 없음') {
							$('#formContactDate').val(rowData.lastContactDate.replace(/\./g, '-'));
						} else {
							$('#formContactDate').val('');
						}

						$('#formMemo').val(rowData.memo);

						this.toggleMode('write');
					}
				}
			},

			api: {
				saveRecord() {
					const sn = $('#mberSn').val();
					const status = $('#formStatus').val();
					const memo = $('#formMemo').val();

					// TODO: 서버로 데이터 전송하는 AJAX 추가
					alert(`${status} 상태로 기록이 저장되었습니다.`);

					AbsenteeManager.ui.toggleMode('list');
					AbsenteeManager.grid.loadData(); // 목록 새로고침
				},

				exportList() {
					alert('엑셀 다운로드 기능 준비중입니다.');
				}
			}
		};

		$(function () {
			AbsenteeManager.init();
		});
		/*]]>*/
	</script>
</th:block>
</html>
