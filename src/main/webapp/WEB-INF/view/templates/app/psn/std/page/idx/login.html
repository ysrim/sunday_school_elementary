<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/png" sizes="16x16" href="/files/favicon-16x16.png">
	<meta name="msapplication-TileColor" content="#ffffff">
	<meta name="theme-color" content="#ffffff">
	<title>봉동중앙교회 초등부 RPG - 로그인</title>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/js-cookie/3.0.5/js.cookie.min.js"></script>
	<link rel="stylesheet" th:href="@{/files/css/login_style.css}">
</head>
<body>
<div class="app-container">
	<div class="page active">
		<div class="sub-header">
			<div class="sub-header-left">
				<h2>봉동중앙교회 초등부 RPG - 로그인</h2>
			</div>
		</div>
		<h3>반가워요! 믿음의 용사님</h3>
		<div class="card">
			<input type="text" id="mberId" placeholder="이름을 입력하세요">
			<input type="password" id="pwd" placeholder="비밀번호">
			<div class="login-options">
				<label class="checkbox-label" for="save-id">
					<input type="checkbox" id="save-id"> 아이디 저장
				</label>
				<label class="checkbox-label" for="auto-login">
					<input type="checkbox" id="auto-login"> 자동 로그인
				</label>
			</div>
			<button class="btn btn-main btn-main-login">로그인</button>
			<button class="btn btn-sub" th:onclick="|location.href='@{/std/idx/join.pg}'|">처음 왔어요 (회원가입)</button>
		</div>
	</div>

	<div id="custom-alert" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
		<div class="card" style="max-width:400px; width:320px; text-align:center; padding:30px; transform: scale(0.9); transition: transform 0.2s;">
			<div id="alert-icon" style="font-size: 3rem; margin-bottom: 15px;">✨</div>
			<h4 id="alert-title" style="margin-bottom: 10px; color: var(--secondary);">알림</h4>
			<p id="alert-message" style="font-size: 0.95rem; color: #666; margin-bottom: 25px; line-height: 1.5; word-break: keep-all;"></p>
			<button class="btn btn-main custom-alert-confirm" style="margin-top:0;">확인</button>
		</div>
	</div>
</div>

<script th:inline="javascript">
	/*<![CDATA[*/
	$(function () {
		'use strict';

		// 1. 설정 및 상수 (쿠키 키값도 객체로 깔끔하게 묶어주었습니다)
		const CONFIG = {
			urls: {
				login: /*[[@{/std/idx/login.ax}]]*/ '/std/idx/login.ax',
				home: /*[[@{/std/home.pg}]]*/ '/std/home.pg',
				join: /*[[@{/std/idx/join.pg}]]*/ '/std/idx/join.pg'
			},
			messages: {
				idEmpty: '아이디를 입력해주세요!',
				pwEmpty: '비밀번호를 입력해주세요!',
				error: '서버 통신 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.'
			},
			cookie: {
				idKey: 'savedMberId',
				autoKey: 'autoLogin'
			}
		};

		const LoginApp = {
			init: function () {
				this.cacheDOM();
				this.bindEvents();
				this.checkSavedCookies(); // 두 개의 쿠키 체크 로직 통합
			},

			cacheDOM: function () {
				this.$idInput = $('#mberId');
				this.$pwInput = $('#pwd');
				this.$loginBtn = $('.btn-main-login');
				this.$saveIdCheck = $('#save-id');
				this.$autoLoginCheck = $('#auto-login');
				this.$alert = $('#custom-alert');
				this.$alertMsg = $('#alert-message');
				this.$alertIcon = $('#alert-icon');
				this.$alertTitle = $('#alert-title');
				this.$alertConfirm = $('.custom-alert-confirm');
			},

			bindEvents: function () {
				this.$loginBtn.on('click', () => this.handleLogin());

				// UX: 아이디 입력 후 엔터 누르면 비밀번호 창으로 이동
				this.$idInput.on('keyup', (e) => {
					if (e.key === 'Enter') this.$pwInput.focus();
				});

				this.$pwInput.on('keyup', (e) => {
					if (e.key === 'Enter') this.handleLogin();
				});

				this.$alertConfirm.on('click', () => this.closePopup());
			},

			// ✅ 쿠키 읽기 통합
			checkSavedCookies: function () {
				if (Cookies.get(CONFIG.cookie.idKey)) {
					this.$idInput.val(Cookies.get(CONFIG.cookie.idKey));
					this.$saveIdCheck.prop('checked', true);
				}
				if (Cookies.get(CONFIG.cookie.autoKey)) {
					this.$autoLoginCheck.prop('checked', true);
				}
			},

			// ✅ 쿠키 쓰기/삭제 통합
			handleCookies: function (id) {
				const cookieOptions = {path: '/'};

				// 아이디 저장 쿠키
				if (this.$saveIdCheck.is(':checked')) {
					Cookies.set(CONFIG.cookie.idKey, id, {...cookieOptions, expires: 30});
				} else {
					Cookies.remove(CONFIG.cookie.idKey, cookieOptions);
				}

				// 자동 로그인 쿠키
				if (this.$autoLoginCheck.is(':checked')) {
					Cookies.set(CONFIG.cookie.autoKey, "true", {...cookieOptions, expires: 360});
				} else {
					Cookies.remove(CONFIG.cookie.autoKey, cookieOptions); // 해제 시 삭제 로직 추가
				}
			},

			handleLogin: function () {
				const mberId = this.$idInput.val().trim();
				const pwd = this.$pwInput.val();

				if (!mberId) {
					this.showPopup(CONFIG.messages.idEmpty, '⚠️', '아이디 입력', () => this.$idInput.focus());
					return;
				}
				if (!pwd) {
					this.showPopup(CONFIG.messages.pwEmpty, '🔑', '비밀번호 입력', () => this.$pwInput.focus());
					return;
				}

				this.setLoading(true);

				$.ajax({
					type: "POST",
					url: CONFIG.urls.login,
					contentType: "application/json; charset=utf-8",
					data: JSON.stringify({
						mberId: mberId,
						pwd: pwd,
						autoLogin: this.$autoLoginCheck.is(':checked')
					}),
					success: (data) => {
						if (data.rtnCd === '001') {
							this.handleCookies(mberId); // 통합된 쿠키 함수 한 번만 호출
							this.showPopup(data.rtnMsg, '✨', '환영합니다!', () => {
								location.href = CONFIG.urls.home;
							});
						} else {
							this.setLoading(false);
							this.showPopup(data.rtnMsg || '로그인 실패', '❌', '인증 실패', () => this.$pwInput.val('').focus());
						}
					},
					error: (e) => {
						console.error('Login Error:', e);
						this.setLoading(false);
						this.showPopup(CONFIG.messages.error, '🔥', '오류 발생');
					}
				});
			},

			setLoading: function (isLoading) {
				this.$loginBtn.prop('disabled', isLoading).text(isLoading ? '로그인 중...' : '로그인');
			},

			showPopup: function (msg, icon = '✨', title = '알림', callback) {
				this.$alertMsg.html(msg);
				this.$alertIcon.html(icon);
				this.$alertTitle.text(title);
				this.$alert.css('display', 'flex').addClass('active');
				this.currentCallback = callback;
			},

			closePopup: function () {
				this.$alert.removeClass('active').css('display', 'none');
				if (typeof this.currentCallback === 'function') {
					this.currentCallback();
					this.currentCallback = null;
				}
			}
		};

		LoginApp.init();
	});
	/*]]>*/
</script>
</body>
</html>
